<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#f8fafc"/>
  <!-- Main Body -->
  <rect x="40" y="50" width="120" height="100" rx="10" fill="#1e293b"/>
  <!-- Metal plate base -->
  <rect x="30" y="60" width="140" height="80" rx="5" fill="#94a3b8" opacity="0.3"/>
  <!-- Screws -->
  <circle cx="60" cy="70" r="10" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <line x1="53" y1="70" x2="67" y2="70" stroke="#64748b" stroke-width="2"/>
  <line x1="60" y1="63" x2="60" y2="77" stroke="#64748b" stroke-width="2"/>

  <circle cx="140" cy="70" r="10" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <line x1="133" y1="70" x2="147" y2="70" stroke="#64748b" stroke-width="2"/>
  <line x1="140" y1="63" x2="140" y2="77" stroke="#64748b" stroke-width="2"/>

  <circle cx="60" cy="130" r="10" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <line x1="53" y1="130" x2="67" y2="130" stroke="#64748b" stroke-width="2"/>
  <line x1="60" y1="123" x2="60" y2="137" stroke="#64748b" stroke-width="2"/>

  <circle cx="140" cy="130" r="10" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <line x1="133" y1="130" x2="147" y2="130" stroke="#64748b" stroke-width="2"/>
  <line x1="140" y1="123" x2="140" y2="137" stroke="#64748b" stroke-width="2"/>

  <!-- Clear cover outline -->
  <rect x="40" y="50" width="120" height="100" rx="10" fill="none" stroke="#e2e8f0" stroke-width="4" opacity="0.5"/>
  
  <!-- LED -->
  <circle cx="100" cy="100" r="8" fill="#ef4444" opacity="0.9"/>
  <!-- Labels -->
  <text x="100" y="85" font-family="Arial" font-size="12" font-weight="bold" fill="#f1f5f9" text-anchor="middle">SSR-40 DA</text>
  <text x="100" y="125" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">SOLID STATE RELAY</text>
  <!-- Main Label -->
  <text x="100" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="#0ea5e9" text-anchor="middle">Solid-State Relay (SSR)</text>
</svg>
